<html>
    <head>
        <link rel="stylesheet" href="main.css">
        <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>

    <body>
        <h1>Pomogotchi</h1>
        <main class="card">
            <div class="btns">
                <button id = "btn15" >15 min</button>
                <button id = "btn30" >30 min</button>
                <button id = "btn60" >60 min</button>
            </div>
            <div class="maintimer">
                <p id = "timer">00:00:00</p>
            </div>
            <div>
                <button id = "btnStart">Start</button>
            </div>
            <div class="resetPauseBtn"> 
                <button id = "btnReset">Reset</button>
                <button id = "btnPause">Pause</button>
            </div>
        </main>
        <audio id="timerSound" src="sounds/end-sound.mp3"></audio>
        <script src="main.js"></script>
        </body>
            
</html>
